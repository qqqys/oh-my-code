name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install --yes tmux
      - run: make install
      - run: make build
      - run: make typecheck
      - run: make unit
      - run: make integration
      - run: make smoke
