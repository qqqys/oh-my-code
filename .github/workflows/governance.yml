name: governance
on:
  pull_request:
permissions:
  contents: read
jobs:
  protected-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject autonomous governance changes
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD | grep -E '^(AUTONOMY\.md|\.autonomy/|\.github/workflows/)'; then
            exit 1
          fi
